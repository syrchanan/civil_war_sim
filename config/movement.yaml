# =============================================================================
# MOVEMENT
# Turn-based movement modifiers. Each terrain type has a multiplier applied
# to a unit's base speed to get the actual distance it can cover per turn.
# 1.0 = baseline (open ground). 0.0 = impassable.
# =============================================================================
movement:
  terrain_modifiers:
    open: 1.0       # Farmland, open field — baseline
    forest: 0.6     # Wooded terrain — slows movement
    hill: 0.7       # Rolling hills
    rough: 0.5      # Badlands, broken ground
    mountain: 0.4   # Mountainous terrain
    road: 1.3       # Roads — faster than open ground
    river: 0.2      # Fording a river — very slow
    beach: 0.8      # Sandy beach — slightly slower
    sand: 0.7       # Dunes — slower than beach
    lake: 0.0       # Impassable
    cliff: 0.3      # Very slow — steep rocky terrain
